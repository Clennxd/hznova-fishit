<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HZN Collective | Premium Roblox Market</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="container">
        <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

<header class="fade-in">
    <h1 class="brand">HZNova<span>.</span></h1>
    <p class="subtitle">Exclusive Roblox - Fish It Market</p>
    
    <div class="social-links">
        <a href="https://tiktok.com/@hznovafish.it" target="_blank" class="social-icon"><i class="fab fa-tiktok"></i></a>
        <a href="https://instagram.com/hznova_fishit" target="_blank" class="social-icon"><i class="fab fa-instagram"></i></a>
        <a href="https://discord.gg/r7PuNYCen" target="_blank" class="social-icon"><i class="fab fa-discord"></i></a>
    </div>
</header>

        <section class="input-section fade-in">
            <label>ROBLOX IDENTITY</label>
            <input type="text" id="robloxUser" placeholder="Enter username..." autocomplete="off">
        </section>

        <div class="category-label fade-in">
    <div class="line"></div>
    <span>ITEMS</span>
    <div class="line"></div>
</div>

        <div id="itemGrid" class="item-grid">
            </div>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

<footer class="checkout-footer">
   <section class="payment-selection fade-in">
    <label>SELECT PAYMENT METHOD</label>
    <div class="payment-scroll-wrapper">
        <div id="paymentGrid" class="payment-horizontal-list">
            <div class="pay-option" data-pay="QRIS">
                <i class="fas fa-qrcode"></i> <span>QRIS</span>
            </div>
            <div class="pay-option" data-pay="BRI">
                <i class="fas fa-university"></i> <span>BRI</span>
            </div>
            <div class="pay-option" data-pay="DANA">
                <i class="fas fa-wallet"></i> <span>DANA</span>
            </div>
            <div class="pay-option" data-pay="SEABANK">
                <i class="fas fa-piggy-bank"></i> <span>SeaBank</span>
            </div>
            <div class="pay-option" data-pay="SHOPEEPAY">
                <i class="fas fa-shopping-bag"></i> <span>ShopeePay</span>
            </div>
            <div class="pay-option" data-pay="GOPAY">
                <i class="fas fa-motorcycle"></i> <span>GoPay</span>
            </div>
        </div>
    </div>
</section>
    <div class="btn-container">
        <button id="btnBayar" class="btn-premium">
            <i class="fab fa-whatsapp"></i> <span>Secure Checkout</span>
        </button>
    </div>
</footer>
    </div>

    <script src="script.js"></script>
</body>
</html>
